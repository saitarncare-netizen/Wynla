<!-- Direction E — Smart Decision Fan
     Origin dot (bottom) → short stem up → decision marker (gold ring) →
     fan of 3 forward branches, one in GOLD with destination peak.
     All motion is UPWARD/FORWARD. Other options are visible but faded,
     so the gold path clearly reads as "the smart pick". -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#1E2952"/>

  <!-- Origin dot (you are here) -->
  <circle cx="256" cy="442" r="14" fill="#FAFAF7"/>

  <!-- Origin stem: white, neutral -->
  <line x1="256" y1="428" x2="256" y2="338"
        stroke="#FAFAF7" stroke-width="22" stroke-linecap="round"/>

  <!-- Faded "alternatives considered" — angled UP and OUTWARD only, never crossing through center -->
  <line x1="256" y1="320" x2="115" y2="150"
        stroke="#FAFAF7" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="320" x2="397" y2="150"
        stroke="#FAFAF7" stroke-width="18" stroke-linecap="round" opacity="0.4"/>

  <!-- THE CHOSEN PATH — bold gold, straight up to destination -->
  <line x1="256" y1="320" x2="256" y2="108"
        stroke="#F5C443" stroke-width="30" stroke-linecap="round"/>

  <!-- Destination peak (gold filled triangle) at the top of the chosen path -->
  <polygon points="256,58 296,122 216,122" fill="#F5C443"/>

  <!-- Decision marker at the junction: gold ring with navy core
       = "this is the moment you picked" -->
  <circle cx="256" cy="320" r="24" fill="#F5C443"/>
  <circle cx="256" cy="320" r="11" fill="#1E2952"/>
</svg>
