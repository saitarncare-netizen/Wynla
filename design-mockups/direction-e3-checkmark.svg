<!-- Direction E-3 — Decision Fan + checkmark accent
     Same fan as E-1 (3 branches, 1 chosen gold) but with a clear
     CHECKMARK ✓ symbol at the top of the gold branch instead of a
     destination peak. Explicit "this is the right decision" signal. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#1E2952"/>

  <circle cx="256" cy="442" r="14" fill="#FAFAF7"/>
  <line x1="256" y1="428" x2="256" y2="338"
        stroke="#FAFAF7" stroke-width="22" stroke-linecap="round"/>

  <line x1="256" y1="320" x2="115" y2="150"
        stroke="#FAFAF7" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="320" x2="397" y2="150"
        stroke="#FAFAF7" stroke-width="18" stroke-linecap="round" opacity="0.4"/>

  <!-- Chosen gold path -->
  <line x1="256" y1="320" x2="256" y2="130"
        stroke="#F5C443" stroke-width="30" stroke-linecap="round"/>

  <!-- Checkmark at the top — explicit "right choice" signal -->
  <polyline points="200,115 244,80 320,40"
            stroke="#F5C443" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <circle cx="256" cy="320" r="24" fill="#F5C443"/>
  <circle cx="256" cy="320" r="11" fill="#1E2952"/>
</svg>
