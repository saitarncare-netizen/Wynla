<!-- Wynla brand mark — designed 2026-06 by Smith (Design 2 from
     WYNLA LOGO DEVELOP.pdf, picked + finalized June 2026).

     Composition: sky-blue squircle background, navy mountain
     silhouette with a tall center peak flanked by two shorter
     ridges, white snow caps draping the upper third, and a single
     bold gold S-curve trail down the center face — the "smart line"
     a skier picks among many possible ones. Says the brand promise
     ("Plan smart. Ride better.") in the mark itself.

     viewBox 512x512 + rx 96 lets iOS round the corners on the home
     screen without clipping anything important. The S-curve dies
     out gracefully below 24 px (the snow + peak shape carry the
     identity at favicon scale) — see public/icon-favicon.svg for
     the simplified small-size variant. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Wynla">
  <!-- Sky-blue background. Squircle so iOS auto-rounding doesn't fight
       a fully-square corner. -->
  <rect width="512" height="512" rx="96" fill="#5BAFE6"/>

  <!-- Sky tint at the bottom edge so the mountain reads as planted on
       a horizon, not floating. Subtle wash. -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="#74BCEA"/>

  <!-- Background ridges — softer + farther, gives the foreground
       peak something to stand against. -->
  <path d="M 0,440 L 80,360 L 145,400 L 210,330 L 275,400 L 340,340 L 410,400 L 475,355 L 512,400 L 512,512 L 0,512 Z"
        fill="#1E2952" opacity="0.55"/>

  <!-- Foreground mountain — tall center peak + flanking shoulders.
       Drawn as a single closed path so the silhouette is one shape
       (cleaner at small sizes). -->
  <path d="M 56,440 L 145,330 L 195,265 L 256,120 L 320,260 L 372,335 L 456,440 Z"
        fill="#1E2952"/>

  <!-- Snow on the foreground peak — wraps the upper third in a
       jagged-edged white blanket. Drawn separately so the mountain
       silhouette stays clean if a renderer drops snow detail. -->
  <path d="M 195,265 L 215,278 L 232,260 L 250,280 L 256,120 L 264,280 L 282,258 L 300,278 L 320,260 L 336,278 L 320,295 L 295,278 L 270,302 L 256,288 L 240,302 L 218,278 L 195,290 Z"
        fill="#FAFAF7"/>

  <!-- Gold S-curve trail — the "smart line" a skier picks. Width
       tapers slightly bottom-heavy to suggest downhill motion.
       Cap + join rounded so the curve never looks chipped at
       smaller sizes. -->
  <path d="M 256,150 C 232,210 290,255 252,310 C 220,355 290,395 256,432"
        stroke="#F5C443"
        stroke-width="18"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Tiny sun glint just above the summit — repeats the gold accent
       so the eye finds it even before the S-curve resolves. -->
  <circle cx="256" cy="118" r="9" fill="#F5C443"/>
</svg>
