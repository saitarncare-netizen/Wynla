<!-- Wynla iOS PWA launch splash.
     Sized for iPhone 14 Pro Max portrait (1284 x 2778). Modern iOS
     Safari (11+) also falls back to manifest.json `background_color`
     when this image doesn't match a device — so the navy stays
     consistent across the iPhone lineup either way.

     Composition: navy field, brand mark centered, wordmark below it,
     tagline below that. All drawn from primitives (no font files) so
     this renders identically on every device. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" preserveAspectRatio="xMidYMid slice">
  <!-- Navy background — matches manifest theme_color / body splash. -->
  <rect width="1284" height="2778" fill="#1E2952"/>

  <!-- Brand mark: scaled-down replica of /icon.svg, centered above the
       wordmark. Logo viewBox is 512x512; we render at 360x360 anchored
       at (462, 1100) so it sits roughly 1/3 down the screen. -->
  <g transform="translate(462 1100) scale(0.703125)">
    <rect width="512" height="512" rx="96" fill="#1E2952"/>
    <circle cx="256" cy="442" r="14" fill="#FAFAF7"/>
    <line x1="256" y1="428" x2="256" y2="338"
          stroke="#FAFAF7" stroke-width="22" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="95"  y2="195"
          stroke="#FAFAF7" stroke-width="16" stroke-linecap="round" opacity="0.35"/>
    <line x1="256" y1="320" x2="170" y2="115"
          stroke="#FAFAF7" stroke-width="16" stroke-linecap="round" opacity="0.45"/>
    <line x1="256" y1="320" x2="342" y2="115"
          stroke="#FAFAF7" stroke-width="16" stroke-linecap="round" opacity="0.45"/>
    <line x1="256" y1="320" x2="417" y2="195"
          stroke="#FAFAF7" stroke-width="16" stroke-linecap="round" opacity="0.35"/>
    <line x1="256" y1="320" x2="256" y2="108"
          stroke="#F5C443" stroke-width="30" stroke-linecap="round"/>
    <polygon points="256,58 296,122 216,122" fill="#F5C443"/>
    <circle cx="256" cy="320" r="24" fill="#F5C443"/>
    <circle cx="256" cy="320" r="11" fill="#1E2952"/>
  </g>

  <!-- Wordmark: "Wynla", large bold white, centered horizontally. -->
  <text
    x="642"
    y="1620"
    text-anchor="middle"
    fill="#FAFAF7"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="180"
    font-weight="800"
    letter-spacing="-2"
  >Wynla</text>

  <!-- Tagline. -->
  <text
    x="642"
    y="1710"
    text-anchor="middle"
    fill="#FAFAF7"
    fill-opacity="0.78"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="500"
    letter-spacing="0.5"
  >Plan smart. Ride better.</text>
</svg>
